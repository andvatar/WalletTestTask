databaseChangeLog:
  - changeSet:
      id: 1
      author: AndreyTarasov
      changes:
        - createTable:
            tableName: wallets
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: amount
                  type: number
                  defaultValueNumeric: "0"
                  constraints:
                    nullable: false
              - column:
                  name: currency_code
                  type: varchar2(3)
                  defaultValue: "RUR"
                  constraints:
                    nullable: false
              - column:
                  name: created
                  type: timestamptz
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
              - column:
                  name: updated
                  type: timestamptz
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
        - sqlFile:
            path: db/wallet_updated_trigger.sql
            splitStatements: false
        - tagDatabase:
            tag: v.1.0
      rollback:
        - sqlFile:
            path: db/wallet_drop_trigger.sql
            splitStatements: false
        - dropTable:
            tableName: wallets